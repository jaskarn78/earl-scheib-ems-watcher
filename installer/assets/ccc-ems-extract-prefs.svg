<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="520" height="380" font-family="Arial, sans-serif">

  <!-- Dialog background -->
  <rect x="10" y="10" width="500" height="360" rx="6" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="10" y="10" width="500" height="32" rx="6" fill="#0066cc"/>
  <rect x="10" y="30" width="500" height="12" fill="#0066cc"/>
  <text x="260" y="31" text-anchor="middle" fill="white" font-size="13" font-weight="bold">EMS Extract Preferences</text>

  <!-- Close button -->
  <rect x="482" y="14" width="20" height="20" rx="2" fill="#cc4444"/>
  <text x="492" y="28" text-anchor="middle" fill="white" font-size="12" font-weight="bold">x</text>

  <!-- Section: Output Folder -->
  <text x="30" y="70" fill="#333" font-size="12" font-weight="bold">Output Folder</text>
  <rect x="30" y="78" width="360" height="24" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="38" y="95" fill="#555" font-size="11">C:\CCC\EMS_Export</text>
  <rect x="398" y="78" width="82" height="24" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="439" y="95" text-anchor="middle" fill="#333" font-size="11">Browse...</text>

  <!-- Arrow annotation for Output Folder -->
  <line x1="440" y1="115" x2="210" y2="89" stroke="#e05000" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="445" y="130" fill="#e05000" font-size="10">Set this to the same folder</text>
  <text x="445" y="143" fill="#e05000" font-size="10">you chose during install</text>

  <!-- Section: Options -->
  <text x="30" y="140" fill="#333" font-size="12" font-weight="bold">Extract Options</text>

  <!-- Lock Estimate checkbox -->
  <rect x="30" y="150" width="14" height="14" rx="2" fill="white" stroke="#666" stroke-width="1.5"/>
  <!-- Checkmark -->
  <polyline points="33,157 36,161 42,153" fill="none" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
  <text x="52" y="162" fill="#333" font-size="12">Lock Estimate</text>
  <!-- CHECK annotation -->
  <rect x="330" y="148" width="160" height="20" rx="3" fill="#ffe0b2" stroke="#e05000" stroke-width="1"/>
  <text x="410" y="162" text-anchor="middle" fill="#e05000" font-size="10" font-weight="bold">CHECK THIS BOX</text>
  <line x1="330" y1="158" x2="130" y2="158" stroke="#e05000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Save Workfile checkbox -->
  <rect x="30" y="178" width="14" height="14" rx="2" fill="white" stroke="#666" stroke-width="1.5"/>
  <polyline points="33,185 36,189 42,181" fill="none" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
  <text x="52" y="190" fill="#333" font-size="12">Save Workfile</text>
  <!-- CHECK annotation -->
  <rect x="330" y="176" width="160" height="20" rx="3" fill="#ffe0b2" stroke="#e05000" stroke-width="1"/>
  <text x="410" y="190" text-anchor="middle" fill="#e05000" font-size="10" font-weight="bold">CHECK THIS BOX</text>
  <line x1="330" y1="186" x2="130" y2="186" stroke="#e05000" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Additional unchecked option for realism -->
  <rect x="30" y="206" width="14" height="14" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="52" y="218" fill="#888" font-size="12">Include Photos</text>

  <rect x="30" y="228" width="14" height="14" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="52" y="240" fill="#888" font-size="12">Auto-Submit to Insurer</text>

  <!-- Format options -->
  <text x="30" y="268" fill="#333" font-size="12" font-weight="bold">Export Format</text>
  <rect x="30" y="276" width="120" height="24" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="90" y="293" text-anchor="middle" fill="#333" font-size="11">BMS XML  v</text>

  <!-- Separator -->
  <line x1="30" y1="316" x2="490" y2="316" stroke="#ccc" stroke-width="1"/>

  <!-- Buttons -->
  <rect x="310" y="326" width="80" height="28" rx="3" fill="#0066cc" stroke="#0055bb" stroke-width="1"/>
  <text x="350" y="344" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Save</text>

  <rect x="402" y="326" width="80" height="28" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="442" y="344" text-anchor="middle" fill="#333" font-size="12">Cancel</text>

  <!-- Caption -->
  <text x="260" y="375" text-anchor="middle" fill="#666" font-size="10">CCC ONE -- Tools &gt; Extract &gt; EMS Extract Preferences</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05000"/>
    </marker>
  </defs>
</svg>
