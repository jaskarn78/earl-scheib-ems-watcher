name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  installer-syntax-check:
    name: Installer script syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create placeholder binary (parse check only -- no real binary needed)
        run: |
          mkdir -p dist
          touch dist/earlscheib-artifact.exe

      - name: Validate installer script syntax (full compile = parse check)
        # The amake/innosetup:latest image's entrypoint is iscc itself and
        # accepts only a single filename argument — no separate /Dq /O- flags
        # exposed. A full compile acts as the syntax check.
        run: |
          mkdir -p installer/Output
          chmod -R 777 installer/Output
          docker run --rm \
            -v "$PWD:/work" \
            amake/innosetup:latest \
            /work/installer/earlscheib.iss

  test:
    name: Unit tests (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        # Note: -race requires cgo (C race detector runtime). CGO_ENABLED=0 is for
        # the Windows cross-compile build only; tests run with CGO enabled for -race.
        run: go test ./... -race -count=1

  build-windows:
    name: Cross-compile windows/amd64
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Vet
        run: go vet ./...

      - name: Build windows/amd64
        env:
          GSD_HMAC_SECRET: ${{ secrets.GSD_HMAC_SECRET }}
        run: make build-windows

      - name: Install osslsigncode
        run: |
          sudo apt-get install -y osslsigncode

      - name: Sign binary (skipped if cert secret absent)
        if: env.SIGNING_CERT_B64 != ''
        env:
          SIGNING_CERT_B64: ${{ secrets.SIGNING_CERT_B64 }}
          SIGNING_CERT_PASS: ${{ secrets.SIGNING_CERT_PASS }}
        run: |
          echo "$SIGNING_CERT_B64" | base64 -d > signing.pfx
          osslsigncode sign \
            -pkcs12 signing.pfx \
            -pass "$SIGNING_CERT_PASS" \
            -n "Earl Scheib EMS Watcher" \
            -i "https://support.jjagpal.me" \
            -t http://timestamp.digicert.com \
            -in dist/earlscheib.exe \
            -out dist/earlscheib-signed.exe
          osslsigncode verify -in dist/earlscheib-signed.exe
          rm -f signing.pfx

      - name: Prepare artifact (signed if available, unsigned otherwise)
        run: |
          if [ -f dist/earlscheib-signed.exe ]; then
            cp dist/earlscheib-signed.exe dist/earlscheib-artifact.exe
            echo "Using signed artifact"
          else
            cp dist/earlscheib.exe dist/earlscheib-artifact.exe
            echo "Using unsigned artifact (no signing cert configured)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: earlscheib-windows-amd64
          path: dist/earlscheib-artifact.exe
          retention-days: 7
          if-no-files-found: error

  build-portable:
    name: Build portable zip
    runs-on: ubuntu-latest
    needs: [build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Download Windows binary artifact
        uses: actions/download-artifact@v4
        with:
          name: earlscheib-windows-amd64
          path: dist/

      - name: Rename artifact to earlscheib.exe
        run: mv dist/earlscheib-artifact.exe dist/earlscheib.exe

      - name: Build portable zip (skip build-windows step; binary already in dist/)
        run: |
          mkdir -p dist/portable-staging/tasks
          cp dist/earlscheib.exe                                    dist/portable-staging/earlscheib.exe
          cp portable/setup.cmd                                      dist/portable-staging/setup.cmd
          cp portable/uninstall.cmd                                  dist/portable-staging/uninstall.cmd
          cp portable/README.txt                                     dist/portable-staging/README.txt
          cp portable/config.ini.template                            dist/portable-staging/config.ini.template
          cp portable/tasks/EarlScheibEMSWatcher-SYSTEM.xml         dist/portable-staging/tasks/
          cp portable/tasks/EarlScheibEMSWatcher-User.xml           dist/portable-staging/tasks/
          cd dist/portable-staging && zip -r ../EarlScheibWatcher-Portable.zip .
          rm -rf dist/portable-staging

      - name: Verify portable zip exists
        run: |
          test -f dist/EarlScheibWatcher-Portable.zip || \
            (echo "ERROR: portable zip not produced" && exit 1)
          ls -lh dist/EarlScheibWatcher-Portable.zip
          unzip -l dist/EarlScheibWatcher-Portable.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: earlscheib-portable
          path: dist/EarlScheibWatcher-Portable.zip
          retention-days: 7
          if-no-files-found: error

  build-installer:
    name: Build installer (Inno Setup)
    runs-on: ubuntu-latest
    needs: [build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download signed binary artifact
        uses: actions/download-artifact@v4
        with:
          name: earlscheib-windows-amd64
          path: dist/

      - name: Rename artifact to expected name
        run: mv dist/earlscheib-artifact.exe dist/earlscheib-artifact.exe || true
        # The artifact is already named earlscheib-artifact.exe from build-windows

      - name: Build installer via Docker (amake/innosetup:latest)
        # Image entrypoint is iscc, takes a single filename arg.
        # Pre-create + world-writable Output dir: the :latest image runs
        # under a non-root uid that can't write into the bind-mounted
        # workspace as-is, so iscc fails with "File access denied" when
        # emitting EarlScheibWatcher-Setup.exe.
        run: |
          mkdir -p installer/Output
          chmod -R 777 installer/Output
          docker run --rm \
            -v "$PWD:/work" \
            amake/innosetup:latest \
            /work/installer/earlscheib.iss

      - name: Verify installer output exists
        run: |
          test -f installer/Output/EarlScheibWatcher-Setup.exe || \
            (echo "ERROR: installer exe not produced" && exit 1)
          ls -lh installer/Output/EarlScheibWatcher-Setup.exe

      - name: Install osslsigncode
        run: sudo apt-get install -y osslsigncode

      - name: Sign installer (skipped if cert secret absent)
        if: env.SIGNING_CERT_B64 != ''
        env:
          SIGNING_CERT_B64: ${{ secrets.SIGNING_CERT_B64 }}
          SIGNING_CERT_PASS: ${{ secrets.SIGNING_CERT_PASS }}
        run: |
          echo "$SIGNING_CERT_B64" | base64 -d > signing.pfx
          osslsigncode sign \
            -pkcs12 signing.pfx \
            -pass "$SIGNING_CERT_PASS" \
            -n "Earl Scheib EMS Watcher Setup" \
            -i "https://support.jjagpal.me" \
            -t http://timestamp.digicert.com \
            -in installer/Output/EarlScheibWatcher-Setup.exe \
            -out installer/Output/EarlScheibWatcher-Setup-signed.exe
          osslsigncode verify -in installer/Output/EarlScheibWatcher-Setup-signed.exe
          mv installer/Output/EarlScheibWatcher-Setup-signed.exe \
             installer/Output/EarlScheibWatcher-Setup.exe
          rm -f signing.pfx

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: earlscheib-installer
          path: installer/Output/EarlScheibWatcher-Setup.exe
          retention-days: 7
          if-no-files-found: error
