name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  installer-syntax-check:
    name: Installer script syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create placeholder binary (parse check only -- no real binary needed)
        run: |
          mkdir -p dist
          touch dist/earlscheib-artifact.exe

      - name: Validate installer script syntax (iscc parse-only)
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            amake/innosetup:6.7.1 \
            iscc /Dq /O- /work/installer/earlscheib.iss

  test:
    name: Unit tests (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        # Note: -race requires cgo (C race detector runtime). CGO_ENABLED=0 is for
        # the Windows cross-compile build only; tests run with CGO enabled for -race.
        run: go test ./... -race -count=1

  build-windows:
    name: Cross-compile windows/amd64
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Vet
        run: go vet ./...

      - name: Build windows/amd64
        env:
          GSD_HMAC_SECRET: ${{ secrets.GSD_HMAC_SECRET }}
        run: make build-windows

      - name: Install osslsigncode
        run: |
          sudo apt-get install -y osslsigncode

      - name: Sign binary (skipped if cert secret absent)
        if: env.SIGNING_CERT_B64 != ''
        env:
          SIGNING_CERT_B64: ${{ secrets.SIGNING_CERT_B64 }}
          SIGNING_CERT_PASS: ${{ secrets.SIGNING_CERT_PASS }}
        run: |
          echo "$SIGNING_CERT_B64" | base64 -d > signing.pfx
          osslsigncode sign \
            -pkcs12 signing.pfx \
            -pass "$SIGNING_CERT_PASS" \
            -n "Earl Scheib EMS Watcher" \
            -i "https://support.jjagpal.me" \
            -t http://timestamp.digicert.com \
            -in dist/earlscheib.exe \
            -out dist/earlscheib-signed.exe
          osslsigncode verify -in dist/earlscheib-signed.exe
          rm -f signing.pfx

      - name: Prepare artifact (signed if available, unsigned otherwise)
        run: |
          if [ -f dist/earlscheib-signed.exe ]; then
            cp dist/earlscheib-signed.exe dist/earlscheib-artifact.exe
            echo "Using signed artifact"
          else
            cp dist/earlscheib.exe dist/earlscheib-artifact.exe
            echo "Using unsigned artifact (no signing cert configured)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: earlscheib-windows-amd64
          path: dist/earlscheib-artifact.exe
          retention-days: 7
          if-no-files-found: error
