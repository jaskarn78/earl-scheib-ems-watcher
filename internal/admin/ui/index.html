<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Earl Scheib Concord — Queue</title>

  <!-- Warm cream ES monogram favicon; matches the light admin palette. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23faf7f2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='18' fill='%238b2a2a'>ES</text></svg>">

  <!-- Google Fonts: Fraunces (display serif) + Work Sans (body) + IBM Plex Mono (data). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="/main.css">
</head>
<body>
  <header class="topbar" role="banner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">ES</span>
      <span class="brand-name">Earl Scheib</span>
      <span class="brand-sep" aria-hidden="true">·</span>
      <span class="brand-mode">Queue</span>
    </div>

    <div class="stats" aria-label="Queue statistics">
      <span class="stat"><b id="stat-pending">0</b><span class="stat-label">Pending</span></span>
      <span class="stat-sep" aria-hidden="true">·</span>
      <span class="stat"><b id="stat-sent">0</b><span class="stat-label">Sent today</span></span>
      <span class="stat-sep" aria-hidden="true">·</span>
      <span class="stat"><b id="stat-failed">0</b><span class="stat-label">Failed</span></span>
    </div>

    <div class="sync" role="status" aria-live="polite">
      <span id="sync-dot" class="sync-dot" aria-hidden="true"></span>
      <span id="sync-caption" class="sync-caption">Last synced —</span>
      <button id="refresh-btn" class="refresh-btn" type="button" aria-label="Refresh queue (R)" title="Press R to refresh">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M13.5 8a5.5 5.5 0 1 1-1.61-3.89"></path>
          <path d="M13.5 2.5v3h-3"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- QAJ-02: filter chips + live search. Keep the light Fraunces aesthetic;
       Work Sans uppercase with letter-spacing for the chips; oxblood selected
       state. Search uses canvas bg + oxblood focus accent. -->
  <section class="controls" aria-label="Queue filters">
    <nav class="filters" role="tablist" aria-label="Filter jobs">
      <button class="filter" type="button" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter" type="button" data-filter="estimates" role="tab" aria-selected="false">Estimates</button>
      <button class="filter" type="button" data-filter="completed" role="tab" aria-selected="false">Work Completed</button>
      <button class="filter" type="button" data-filter="sent" role="tab" aria-selected="false">Sent</button>
    </nav>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="7" cy="7" r="5"></circle>
        <path d="M14 14l-3.5-3.5"></path>
      </svg>
      <input id="search" class="search" type="search" placeholder="Search by name, phone, VIN, RO…" aria-label="Search">
    </div>
  </section>

  <main id="queue" class="queue" aria-live="polite" aria-busy="true">
    <!-- Estimate cards (with nested timelines) injected by main.js -->
  </main>

  <section id="diagnostic" class="diagnostic" aria-label="Diagnostic">
    <h2 class="diag-heading">Diagnostic</h2>
    <dl class="diag-grid">
      <dt>Watch folder</dt>             <dd id="diag-watch-folder">—</dd>
      <dt>Folder exists</dt>            <dd id="diag-folder-exists">—</dd>
      <dt>Files in folder</dt>          <dd id="diag-file-count">—</dd>
      <dt>Last scan</dt>                <dd id="diag-last-scan">—</dd>
      <dt>Last heartbeat (server)</dt>  <dd id="diag-last-heartbeat">—</dd>
      <dt>HMAC secret baked in</dt>     <dd id="diag-hmac">—</dd>
      <dt>Version</dt>                  <dd id="diag-version">—</dd>
    </dl>
  </section>

  <!-- Estimate card = one customer + one vehicle with ALL their pending/sent
       follow-ups rendered as a vertical timeline. Preserves the OH4 aesthetic
       (Fraunces name, soft cream card, oxblood accents) while adding timeline
       structure for QAJ-02. -->
  <template id="estimate-card-template">
    <article class="estimate-card">
      <header class="estimate-card__header">
        <h2 class="estimate-card__name"></h2>
        <p class="estimate-card__contact">
          <span class="estimate-phone mono"></span>
          <span class="estimate-email"></span>
        </p>
        <p class="estimate-card__vehicle">
          <span class="estimate-vehicle-desc"></span>
          <span class="estimate-vin mono" title=""></span>
          <span class="estimate-ro"></span>
        </p>
      </header>
      <ol class="timeline"></ol>
    </article>
  </template>

  <!-- One row inside a timeline = one follow-up job (24h/3day/review). -->
  <template id="timeline-entry-template">
    <li class="timeline__entry" data-state="pending">
      <span class="timeline__dot" aria-hidden="true"></span>
      <div class="timeline__body">
        <div class="timeline__meta">
          <span class="job-chip"></span>
          <span class="job-send">
            <span class="job-send-relative"></span>
            <span class="job-send-absolute mono"></span>
          </span>
          <span class="timeline__sent-stamp" hidden></span>
        </div>
        <figure class="sms-preview">
          <figcaption class="sms-label">Customer receives</figcaption>
          <div class="sms-bubble"></div>
        </figure>
        <footer class="job-actions">
          <button class="btn btn-primary send-now-btn" type="button">
            <span>Send now</span>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 8h10"></path>
              <path d="M9 4l4 4-4 4"></path>
            </svg>
          </button>
          <button class="btn btn-ghost cancel-btn" type="button">Cancel</button>
          <span class="job-error" hidden></span>
        </footer>
      </div>
    </li>
  </template>

  <!-- Empty state: warm, friendly. Not "NO PENDING JOBS" in caps. -->
  <template id="empty-state-template">
    <section class="empty">
      <div class="empty-card">
        <span class="empty-dot" aria-hidden="true"></span>
        <h1 class="empty-title">All caught up</h1>
        <p class="empty-sub">Nothing queued right now — new estimates will appear here automatically.</p>
      </div>
    </section>
  </template>

  <template id="error-state-template">
    <section class="error">
      <p class="error-msg"></p>
    </section>
  </template>

  <!-- Sleep panel: shown when the local admin server has stopped responding
       after the JS retry window (60s). Friendly, not scary. Same warm palette. -->
  <template id="sleep-state-template">
    <section class="sleep">
      <div class="sleep-card">
        <span class="sleep-badge" aria-hidden="true"></span>
        <h1 class="sleep-title">Queue Viewer is resting</h1>
        <p class="sleep-sub">
          It goes to sleep after 30&nbsp;minutes to save resources.
        </p>
        <p class="sleep-instruction">
          Double-click the <strong>Earl&nbsp;Scheib&nbsp;Queue</strong> shortcut on your desktop to wake it up.
        </p>
      </div>
    </section>
  </template>

  <script src="/main.js" defer></script>
</body>
</html>
